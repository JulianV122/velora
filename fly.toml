# fly.toml app configuration file generated for velora-vannesa on 2026-05-08T05:23:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'velora-vannesa'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/var/data'
  PORT = '8080'
  UPLOADS_DIR = '/var/data/uploads'

[[mounts]]
  source = 'velora_data'
  destination = '/var/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
