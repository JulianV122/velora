# Edita "app" después de correr `fly launch` o pon aquí el nombre que quieras
app = "velora"
primary_region = "iad"   # Ashburn, Virginia — la más cercana a Colombia disponible

[build]

[env]
  DATA_DIR = "/var/data"
  UPLOADS_DIR = "/var/data/uploads"
  PORT = "8080"

[[mounts]]
  source = "velora_data"
  destination = "/var/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1     # mantén 1 corriendo para evitar cold starts
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
